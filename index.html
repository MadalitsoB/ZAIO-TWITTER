<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <div class="logo">
          <img src="images - Copy.png" alt="X logo" height="50" width="50" />
        </div>

        <nav>
          <ul>
            <li>
              <a href="#">
                <img src="home.png" alt="Home" width="50" height="50" />
                <span>Home</span>
              </a>
            </li>

            <li>
              <a href="#">
                <img src="explore.png" alt="Explore" width="50" height="50" />
                <span>Explore</span>
              </a>
            </li>

            <li>
              <a href="#">
                <img
                  src="notification.png"
                  alt="Notifications"
                  width="50"
                  height="50"
                />
                <span>Notifications</span>
              </a>
            </li>

            <li>
              <a href="#">
                <img src="chat icon.png" alt="Chat" width="50" height="50" />
                <span>Chat</span>
              </a>
            </li>

            <li>
              <a href="#">
                <img src="grok--v2.png" alt="Grok" width="50" height="50" />
                <span>Grok</span>
              </a>
            </li>
            <li>
              <a href="#">
                <img src="tick icon.png" alt="Premuim" width="50" height="50" />
                <span>Premuim</span>
              </a>
            </li>
            <li>
              <a href="#">
                <img
                  src="profile icon.png"
                  alt="Profile"
                  width="50"
                  height="50"
                />
                <span>Profile</span>
              </a>
            </li>
            <li>
              <a href="#">
                <img src="more.png" alt="More" width="50" height="50" />
                <span>More</span>
              </a>
            </li>
            <li>
              <button class="post-button" type="button">Post</button>
            </li>
          </ul>
        </nav>
      </aside>

      <main class="timeline">
        <div class="button-container">
          <button>For you</button>
          <button>Following</button>
        </div>
        <input
          type="text"
          placeholder="What's happening?"
          class="tweet-input"
      </main>

      <aside class="trending">
        <h1>Trending</h1>
      </aside>
    </div>
  </body>
</html>
